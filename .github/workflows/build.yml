name: EvolutionX Android 12 Build fleur SSH

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atrof-muhitni va Repo skriptini sozlash
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo
          git config --global user.name "Abdurahmon Karimov"
          git config --global user.email "abdurahmon@example.com"

      - name: EvolutionX Source yuklash (Android 12.1 - Snow)
        run: |
          mkdir evox && cd evox
          repo init -u https://github.com/Evolution-X/manifest.git -b snow --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Terminalga ulanish (SSH)
        uses: mxschmitt/action-tmate@v3
        if: always()
        timeout-minutes: 360
