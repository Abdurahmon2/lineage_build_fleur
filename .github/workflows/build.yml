name: LineageOS Build fleur

on:
  workflow_dispatch: # Bu tugmani bossangiz build boshlanadi

jobs:
  build:
    runs-on: ubuntu-latest # GitHub'ning eng kuchli serveri
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Atrof-muhitni sozlash
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Repo skriptini o'rnatish
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Source kodni yuklash (Sync)
        run: |
          mkdir lineage && cd lineage
          repo init -u https://github.com/LineageOS/android.git -b lineage-19.1 --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
          
      - name: Note 11S (fleur) daraxtini qo'shish
        run: |
          cd lineage
          # Bu yerda sening fleur uchun device tree linklaring bo'lishi kerak
          git clone https://github.com/ProjectElixir-Devices/android_device_xiaomi_fleur.git -b 12 device/xiaomi/fleur
